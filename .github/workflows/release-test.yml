name: Release Test

on:
    pull_request:
        branches: ['*']
        types:
            - opened
            - synchronize
            - closed
        paths:
            - '.github/**'
            - 'package.json'
            - 'package-lock.json'
            - 'forge.config.js'
            - 'vite*.ts'
    push:
        branches: [main]

permissions: read-all

jobs:
    release-test:
        runs-on: ${{ matrix.os }}
        timeout-minutes: 30

        strategy:
            matrix:
                os: [
                    macos-15,
                    ubuntu-latest,
                    windows-latest
                ]

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 18
                  cache: 'npm'
            - name: setup python
              uses: actions/setup-python@v6
              with:
                python-version: 3.12
            - name: install setuptools (macos)
              if: matrix.os == 'macos-15'
              run: python3 -m pip install setuptools
            - run: npm ci --legacy-peer-deps
            - name: publish --dry-run
              shell: bash
              run: |
                  if [[ "${{ matrix.os }}" != "macos-15" ]]; then
                      npm run publish -- --dry-run
                  else
                      npm run publish -- --dry-run --arch=universal
                  fi
